version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./Code/SaaS/working/api
      dockerfile: Dockerfile
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/shopvridhi
      - JWT_ACCESS_SECRET=dev-access-secret
      - JWT_REFRESH_SECRET=dev-refresh-secret
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
    depends_on:
      - mongo
    ports:
      - "4000:4000"

volumes:
  mongo_data:
